<!-- ==================== Template: seleção por Bloco primeiro ==================== -->
<template id="template-item">
    <div class="row g-3 item-lote mb-3 border rounded p-3 bg-light position-relative">
        <button type="button" class="btn-close position-absolute top-0 end-0 m-2"
                onclick="removerItem(this)" aria-label="Remover"></button>

        <div class="col-md-2">
            <label class="form-label">Bloco</label>
            <!-- CORRIGIDO: removido oninput inline para evitar dupla chamada com addEventListener -->
            <input type="text"
                   class="form-control form-control-lg bloco-input"
                   placeholder="A"
                   list="blocos-list"
                   required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Unidade / Apartamento <span class="text-danger">*</span></label>
            <select name="unidade_id" class="form-select form-select-lg unidade-select" required>
                <option value="">Selecione o bloco primeiro...</option>
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">Descrição / Conteúdo</label>
            <input type="text" name="descricao" class="form-control form-control-lg"
                   placeholder="Caixa Amazon, Correios, Magazine...">
        </div>
        <div class="col-md-3">
            <label class="form-label">Foto da encomenda <span class="text-danger">*</span></label>
            <input type="file" name="foto" class="form-control"
                   accept=".jpg,.jpeg,.png,.webp" required>
            <div class="form-text small">Obrigatória</div>
        </div>
    </div>
</template>

<datalist id="blocos-list">
    {% set blocos = unidades | map(attribute='bloco') | select('defined') | unique | list %}
    {% for b in blocos if b %}
    <option value="{{ b }}">
    {% endfor %}
</datalist>

<script>
/* ==================== Lote de Encomendas (código único) ==================== */

function adicionarItem() {
    const container = document.getElementById('itens-container');
    const template = document.getElementById('template-item');
    const clone = template.content.cloneNode(true);

    // CORRIGIDO: único ponto de vinculação do evento — sem oninput inline no template
    const blocoInput = clone.querySelector('.bloco-input');
    if (blocoInput) {
        blocoInput.addEventListener('input', function () {
            filtrarUnidadesPorBloco(this);
        });
    }

    container.appendChild(clone);
}

function removerItem(btn) {
    const item = btn.closest('.item-lote');
    if (item) item.remove();
}

function limparItens() {
    document.getElementById('itens-container').innerHTML = '';
    adicionarItem(); // mantém pelo menos um item
}

// Inicializa com 1 item ao carregar a página
document.addEventListener('DOMContentLoaded', function () {
    const container = document.getElementById('itens-container');
    if (container && container.children.length === 0) {
        adicionarItem();
    }
});

/* ==================== QR Code Scanner ==================== */

let qrStream = null;
let qrAnimationFrame = null;

async function startQRScanner() {
    const container = document.getElementById('qr-scanner-container');
    const video = document.getElementById('qr-video');
    container.classList.remove('d-none');
    container.classList.add('d-block');

    try {
        qrStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });
        video.srcObject = qrStream;
        await video.play();

        const scan = () => {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });
                if (code) {
                    stopQRScanner();
                    const input = document.getElementById('codigoInput');
                    input.value = code.data;
                    verificarCodigo(); // auto verifica
                }
            }
            qrAnimationFrame = requestAnimationFrame(scan);
        };
        qrAnimationFrame = requestAnimationFrame(scan);

    } catch (err) {
        alert("Não foi possível acessar a câmera. Permita o acesso ou use a digitação manual.");
        stopQRScanner();
    }
}

function stopQRScanner() {
    const container = document.getElementById('qr-scanner-container');
    const video = document.getElementById('qr-video');

    if (qrAnimationFrame) {
        cancelAnimationFrame(qrAnimationFrame);
        qrAnimationFrame = null;
    }
    if (qrStream) {
        qrStream.getTracks().forEach(track => track.stop());
        qrStream = null;
    }
    video.srcObject = null;
    container.classList.remove('d-block');
    container.classList.add('d-none');
}

// Destaca aviso após reenvio/recebimento com link WhatsApp
window.addEventListener('load', () => {
    const params = new URLSearchParams(window.location.search);
    if (params.has('wa_link')) {
        const link = params.get('wa_link'); // CORRIGIDO: era $%7Blink%7D (URL-encoded), agora usa template literal corretamente
        const div = document.createElement('div');
        div.className = 'alert alert-success mt-2';
        div.innerHTML = `
            Encomenda registrada com QR Code!
            <a href="https://encomendas-mirantes.onrender.com/${link}" target="_blank" class="btn btn-success btn-sm ms-2">
                Abrir WhatsApp e enviar aviso agora
            </a>
            <button type="button" class="btn-close float-end" onclick="this.parentElement.remove()"></button>
        `;
        const mainCard = document.querySelector('.card');
        if (mainCard) mainCard.parentNode.insertBefore(div, mainCard.nextSibling);
    }
});
</script>
